name: Appium Android E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest # Using Ubuntu for extremely fast simulated execution

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Appium
        run: |
          npm install appium --legacy-peer-deps
          npx appium driver install uiautomator2

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install Appium-Python-Client openpyxl

      - name: Run Appium Tests
        run: python appium_tests/test_e2e_flow.py
        env:
          CI: 'true'

      - name: Upload Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-test-report
          path: appium_tests/*.xlsx
          retention-days: 7
