name: Locust Load Tests

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI
  schedule:
    - cron: '0 2 * * *' # Run automatically every day at 2:00 AM

jobs:
  load-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Flask Backend Server
        run: python server/app.py &
        env:
          PORT: 7082
          JWT_SECRET_KEY: 'ci-secret-key'

      - name: Wait for Backend to Boot
        run: sleep 5

      - name: Run Locust Headless Load Test
        run: |
          # Runs 100 users, spawns 10 users per second, runs for exactly 1 minute
          locust -f locustfile.py --headless -u 100 -r 10 --run-time 1m --host http://localhost:7082
