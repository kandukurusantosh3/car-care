name: Android Appium E2E Automation & GitHub Pages Deployment

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # Run nightly at 2 AM UTC

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-test:
    name: Build APK and Run Appium Tests
    runs-on: macos-13 # macos-13 provides KVM virtualization/hardware acceleration for faster Android Emulator startup
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Node Dependencies
      run: npm install --legacy-peer-deps

    - name: Build Web Application
      run: npm run build

    - name: Sync Capacitor Android Project
      run: npx cap sync android

    - name: Build Android Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug
        cd ..

    - name: Verify Built APK Location
      run: |
        ls -la android/app/build/outputs/apk/debug/app-debug.apk
        echo "APK_PATH=$PWD/android/app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_ENV

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install Python Automation Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Start Appium Server
      run: |
        npm install -g appium
        appium driver install uiautomator2
        appium --port 4723 --address 127.0.0.1 &
        sleep 5

    - name: Verify Appium Health
      run: |
        curl -s http://127.0.0.1:4723/status || exit 1

    - name: Run E2E Appium Tests inside Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 31
        target: google_apis
        arch: x86_64
        profile: pixel_6
        force-avd-creation: false
        emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
        disable-animations: true
        script: |
          adb wait-for-device
          adb install android/app/build/outputs/apk/debug/app-debug.apk
          PYTHONPATH=. python automation/runners/run_tests.py

    - name: Upload Excel & HTML Reports Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports-build-${{ github.run_number }}
        path: |
          Test Results/
        retention-days: 30

    - name: Publish Action Job Step Summary
      if: always()
      run: |
        if [ -f "Test Results/Summary/summary.md" ]; then
          cat "Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
        else
          echo "No execution summary found." >> $GITHUB_STEP_SUMMARY
        fi

    - name: Deploy Reports to GitHub Pages
      if: always()
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Stash current workspace reports changes so checkout does not fail
        mkdir -p temp_reports
        cp -r reports/* temp_reports/
        
        # Checkout gh-pages branch (or orphan it if missing)
        git fetch origin gh-pages || true
        git checkout gh-pages || git checkout --orphan gh-pages
        
        # Clean existing pages folder structure
        rm -rf reports
        
        # Copy new build reports back to destination
        mkdir -p reports
        cp -r temp_reports/* reports/
        rm -rf temp_reports
        
        # Add, commit, and push
        git add reports/
        git commit -m "Deploy Appium automation report for build #${{ github.run_number }} [skip ci]" || echo "No changes to commit"
        git push origin gh-pages --force
